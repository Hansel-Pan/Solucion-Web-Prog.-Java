<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background: linear-gradient(135deg,#1e3c72,#2a5298);
        }

        .login-container{
            width:350px;
            background:white;
            padding:40px;
            border-radius:15px;
            box-shadow:0 10px 25px rgba(0,0,0,0.3);
        }

        .login-container h2{
            text-align:center;
            margin-bottom:30px;
            color:#333;
        }

        .input-group{
            margin-bottom:20px;
        }

        .input-group label{
            display:block;
            margin-bottom:8px;
            color:#555;
            font-weight:bold;
        }

        .input-group input{
            width:100%;
            padding:12px;
            border:1px solid #ccc;
            border-radius:8px;
            outline:none;
            transition:0.3s;
        }

        .input-group input:focus{
            border-color:#2a5298;
            box-shadow:0 0 8px rgba(42,82,152,0.4);
        }

        .btn-login{
            width:100%;
            padding:12px;
            border:none;
            border-radius:8px;
            background:#2a5298;
            color:white;
            font-size:16px;
            cursor:pointer;
            transition:0.3s;
        }

        .btn-login:hover{
            background:#1e3c72;
        }

        .error{
            color:red;
            text-align:center;
            margin-bottom:15px;
        }

        .logout{
            color:green;
            text-align:center;
            margin-bottom:15px;
        }

    </style>

</head>
<body>

<div class="login-container">

    <h2>Iniciar Sesión</h2>

    <div th:if="${param.error}" class="error">
        Usuario o contraseña incorrectos
    </div>

    <div th:if="${param.logout}" class="logout">
        Sesión cerrada correctamente
    </div>

    <form th:action="@{/login}" method="post">

        <div class="input-group">
            <label>Usuario</label>
            <input type="text" name="username" placeholder="Ingrese usuario">
        </div>

        <div class="input-group">
            <label>Contraseña</label>
            <input type="password" name="password" placeholder="Ingrese contraseña">
        </div>

        <button type="submit" class="btn-login">
            Ingresar
        </button>

    </form>

</div>

</body>
</html>
